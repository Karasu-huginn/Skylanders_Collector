services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: skylanders
      POSTGRES_DB: Skylanders
    volumes:
      - skylanders-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d Skylanders"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      USER: postgres
      PASSWORD: skylanders
      HOST: db
      PORT: "5432"
      DB_NAME: Skylanders
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/editions/"]
      interval: 5s
      timeout: 3s
      retries: 10

  seed:
    build: .
    entrypoint: ["sh", "seed.sh"]
    environment:
      API_URL: http://api:8080/api
    depends_on:
      api:
        condition: service_healthy
    restart: "no"

volumes:
  skylanders-db-data:
